<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Midpoint</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="midpoint_icon.png">

<style>
body {margin:0;font-family:Arial;background:#e6f0ff;}
header {background:#007BFF;padding:20px;text-align:center;}
header img {width:120px;}
.container {padding:20px;max-width:700px;margin:auto;}
.card {background:white;padding:15px;border-radius:10px;margin-bottom:15px;}
input,button {width:100%;padding:10px;margin:10px 0;}
.filters button {width:auto;margin:5px;}
#map {height:420px;margin-top:20px;}
</style>
</head>

<body>

<header>
<img src="midpoint_icon.png">
</header>

<div class="container">
<div class="card">

<input id="address1" placeholder="First location">
<input id="address2" placeholder="Second location">

<input id="placeKeyword" placeholder="Search (optional)">

<div class="filters">
<button onclick="setFilter('cafe')">☕</button>
<button onclick="setFilter('restaurant')">🍽️</button>
<button onclick="setFilter('park')">🌳</button>
<button onclick="setFilter('lodging')">🏨</button>
<button onclick="setFilter('movie_theater')">🎬</button>
</div>

<label>Adjust midpoint</label>
<input type="range" id="weightSlider" min="0" max="100" value="50">

<button onclick="findMidpoint()">Find Meetup Spot</button>

<div id="selectedPlace"></div>

</div>

<div id="map"></div>
</div>

<script>
let map, geocoder, placesService;
let markers=[], midpointMarker, m1, m2;

function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
zoom:11,center:{lat:43.7,lng:-79.4}
});
geocoder=new google.maps.Geocoder();
placesService=new google.maps.places.PlacesService(map);

// autocomplete
new google.maps.places.Autocomplete(document.getElementById("address1"));
new google.maps.places.Autocomplete(document.getElementById("address2"));
}

function setFilter(type){
document.getElementById("placeKeyword").value=type;
}

function clearMarkers(){
markers.forEach(m=>m.setMap(null));
markers=[];
if(midpointMarker) midpointMarker.setMap(null);
if(m1) m1.setMap(null);
if(m2) m2.setMap(null);
document.getElementById("selectedPlace").innerHTML="";
}

function searchNearby(mid,keyword){

placesService.nearbySearch({
location:mid,
radius:1000,
keyword:keyword||undefined
},function(results,status){

if(status!=="OK"||!results.length)return;

results.slice(0,5).forEach(place=>{

const marker=new google.maps.Marker({
map:map,
position:place.geometry.location,
label:String.fromCharCode(65+markers.length) // A B C D E
});

markers.push(marker);

marker.addListener("click",function(){

const dest=place.vicinity||place.name;
const link="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(dest);

document.getElementById("selectedPlace").innerHTML=
"✅ "+place.name+"<br>"+
(dest)+"<br>"+
'<a href="'+link+'" target="_blank">Navigate</a> | '+
'<button onclick="sharePlace(\''+place.name+'\',\''+dest+'\')">Share</button>';

});

});

});
}

function findMidpoint(){

const a1=document.getElementById("address1").value;
const a2=document.getElementById("address2").value;
const keyword=document.getElementById("placeKeyword").value;
const slider=document.getElementById("weightSlider").value/100;

if(!a1||!a2){alert("Enter both");return;}

clearMarkers();

geocoder.geocode({address:a1},function(r1,s1){
if(s1!=="OK")return;

geocoder.geocode({address:a2},function(r2,s2){
if(s2!=="OK")return;

const c1=r1[0].geometry.location;
const c2=r2[0].geometry.location;

m1=new google.maps.Marker({position:c1,map:map,label:"1"});
m2=new google.maps.Marker({position:c2,map:map,label:"2"});

const midLat=(c1.lat()+c2.lat())/2;
const midLng=(c1.lng()+c2.lng())/2;

const shift=(slider-0.5)*0.6;

const mid={
lat:midLat+(c1.lat()-midLat)*shift,
lng:midLng+(c1.lng()-midLng)*shift
};

midpointMarker=new google.maps.Marker({
position:mid,
map:map,
icon:"http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
});

const bounds=new google.maps.LatLngBounds();
bounds.extend(c1);
bounds.extend(c2);
bounds.extend(mid);
map.fitBounds(bounds);

searchNearby(mid,keyword);

});
});
}

function sharePlace(name,dest){
const link="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(dest);

if(navigator.share){
navigator.share({
title:"Midpoint",
text:"Meet me here: "+name,
url:link
});
}else{
prompt("Copy this link:",link);
}
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAs8oXRXd_vPW8Ww5cCBS-aDaic8YgB9F4&libraries=places&callback=initMap">
</script>

</body>
</html>
