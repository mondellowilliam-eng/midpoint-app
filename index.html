<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Midpoint</title>
  <link rel="icon" href="midpoint_icon.png" type="image/png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6f0ff; /* soft blue background */
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px;
      background-color: #007BFF; /* main blue header */
      color: white;
      font-size: 2em;
      font-weight: bold;
    }
    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      font-size: 1em;
    }
    label {
      font-weight: bold;
    }
    #map {
      height: 400px;
      width: 100%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>Midpoint Logo</header>

  <div class="container">
    <label for="location1">Enter first location:</label>
    <input type="text" id="location1" placeholder="e.g., 42 Fergus Ave Richmond Hill">

    <label for="location2">Enter second location:</label>
    <input type="text" id="location2" placeholder="e.g., Wonderland">

    <label for="placeType">Pick a place:</label>
    <select id="placeType">
      <option value="cafe">☕ Cafe</option>
      <option value="restaurant">🍽️ Restaurant</option>
      <option value="park">🌳 Park</option>
      <option value="hotel">🏨 Hotel</option>
      <option value="movie_theater">🎬 Movie Theater</option>
    </select>

    <label for="midpointSlider">Adjust midpoint:</label>
    <input type="range" id="midpointSlider" min="0" max="100" value="50">

    <button id="findSpot">Find Meetup Spot</button>
  </div>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Google Maps JavaScript -->
  <script>
    function initMap() {
      // Example midpoint coordinates (replace with dynamic later)
      var midpoint = { lat: 43.836, lng: -79.439 };

      // Create the map
      var map = new google.maps.Map(document.getElementById('map'), {
        zoom: 12,
        center: midpoint
      });

      // Add a marker at the midpoint
      var marker = new google.maps.Marker({
        position: midpoint,
        map: map
      });
    }

    // Placeholder for your button logic
    document.getElementById('findSpot').addEventListener('click', function() {
      alert('This will calculate the midpoint and find your selected place type.');
    });
  </script>

  <!-- Load Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC1N6CfvlBVP4xbY8j5h-YzOA6YIQi-SAw&callback=initMap" async defer></script>

</body>
</html>
