<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Midpoint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="midpoint_icon.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e6f0ff;
    }

    header {
      background: #007BFF;
      padding: 20px;
      text-align: center;
    }

    header img {
      width: 120px;
    }

    .container {
      padding: 20px;
      max-width: 720px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .instructions {
      font-size: 14px;
      color: #444;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0062cc;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .filters button {
      width: auto;
      flex: 1 1 auto;
      min-width: 90px;
      background: #e3f2fd;
      color: #1976d2;
    }

    .filters button:hover {
      background: #bbdefb;
    }

    #map {
      height: 430px;
      margin-top: 20px;
      border-radius: 10px;
    }

    #selectedPlace {
      margin-top: 12px;
      padding: 12px;
      background: #e8f5e9;
      border-radius: 8px;
      line-height: 1.6;
      min-height: 24px;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .action-link,
    .session-btn,
    .live-btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      border: none;
      font-size: 15px;
      color: white;
      width: auto;
    }

    .action-link { background: #007BFF; }
    .session-btn { background: #6f42c1; }
    .live-btn { background: #ff7a00; }

    #distanceInfo,
    #liveInfo {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
      line-height: 1.4;
    }

    #weightWrap {
      margin-top: 10px;
    }

    #weightValue {
      font-weight: bold;
      margin-left: 8px;
    }

    .top-pick {
      background: #fff8e1;
      border: 1px solid #f2d675;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .shared-box {
      background: #eef6ff;
      border: 1px solid #9cc3ff;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .status-ok {
      color: #1a7f37;
      font-weight: bold;
    }

    .status-warn {
      color: #b45309;
      font-weight: bold;
    }

    .status-error {
      color: #b91c1c;
      font-weight: bold;
    }

    .place-list-btn {
      margin-bottom: 8px;
      text-align: left;
    }
  </style>
</head>
<body>

  <header>
    <img src="midpoint_icon.png" alt="Midpoint Logo">
  </header>

  <div class="container">
    <div class="card">
      <div class="instructions">
        Enter two locations → find a spot → click a result letter or result button → navigate, share the full session, or view both live routes on the map
      </div>

      <div id="sharedSessionInfo"></div>

      <input id="address1" placeholder="First location" autocomplete="off">
      <input id="address2" placeholder="Second location" autocomplete="off">

      <input id="placeKeyword" placeholder="Search optional: Starbucks, McDonald's, etc.">

      <div class="filters">
        <button type="button" onclick="setFilter('cafe')">☕ Cafe</button>
        <button type="button" onclick="setFilter('restaurant')">🍽️ Food</button>
        <button type="button" onclick="setFilter('park')">🌳 Park</button>
        <button type="button" onclick="setFilter('lodging')">🏨 Hotel</button>
        <button type="button" onclick="setFilter('movie_theater')">🎬 Movies</button>
      </div>

      <div id="weightWrap">
        <label for="weightSlider">Adjust midpoint <span id="weightValue">50%</span></label>
        <input type="range" id="weightSlider" min="0" max="100" value="50">
      </div>

      <button type="button" onclick="findMidpoint()">Find Meetup Spot</button>

      <div id="distanceInfo"></div>
      <div id="selectedPlace"></div>
      <div id="liveInfo"></div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCJD0P-O892D1qzB0_zNfhylKMTqHHIfYM",
      authDomain: "midpoint-web.firebaseapp.com",
      databaseURL: "https://midpoint-web-default-rtdb.firebaseio.com/",
      projectId: "midpoint-web",
      storageBucket: "midpoint-web.firebasestorage.app",
      messagingSenderId: "73084785329",
      appId: "1:73084785329:web:2586e545c1fa599f648890"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, geocoder, placesService, directionsService;
    let markers = [];
    let midpointMarker = null;
    let m1 = null;
    let m2 = null;
    let destinationMarker = null;

    let selectedShareName = "";
    let selectedShareDestination = "";
    let selectedDestinationLatLng = null;
    let currentSessionId = "";
    let selectedRole = "";
    let liveWatchId = null;

    let liveUser1Marker = null;
    let liveUser2Marker = null;
    let currentPlaces = [];

    let directionsRenderer1 = null;
    let directionsRenderer2 = null;
    let latestUser1Pos = null;
    let latestUser2Pos = null;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 11,
        center: { lat: 43.7, lng: -79.4 }
      });

      geocoder = new google.maps.Geocoder();
      placesService = new google.maps.places.PlacesService(map);
      directionsService = new google.maps.DirectionsService();

      directionsRenderer1 = new google.maps.DirectionsRenderer({
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#007BFF",
          strokeOpacity: 0.8,
          strokeWeight: 5
        }
      });
      directionsRenderer1.setMap(map);

      directionsRenderer2 = new google.maps.DirectionsRenderer({
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#ff7a00",
          strokeOpacity: 0.8,
          strokeWeight: 5
        }
      });
      directionsRenderer2.setMap(map);

      new google.maps.places.Autocomplete(document.getElementById("address1"));
      new google.maps.places.Autocomplete(document.getElementById("address2"));

      document.getElementById("weightSlider").addEventListener("input", function () {
        document.getElementById("weightValue").textContent = this.value + "%";
      });

      loadSession();setInterval
        (checkTrackingHealth, 5000);
    
    }

    function setFilter(type) {
      document.getElementById("placeKeyword").value = type;
    }

    function clearRouteLines() {
      if (directionsRenderer1) directionsRenderer1.set("directions", null);
      if (directionsRenderer2) directionsRenderer2.set("directions", null);
    }

    function clearMarkers() {
      markers.forEach(m => m.setMap(null));
      markers = [];

      if (midpointMarker) midpointMarker.setMap(null);
      if (m1) m1.setMap(null);
      if (m2) m2.setMap(null);
      if (destinationMarker) destinationMarker.setMap(null);

      midpointMarker = null;
      m1 = null;
      m2 = null;
      destinationMarker = null;
      currentPlaces = [];
      selectedDestinationLatLng = null;

      clearRouteLines();

      document.getElementById("selectedPlace").innerHTML = "";
      document.getElementById("distanceInfo").innerHTML = "";
    }

    function getDistanceKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function createSession() {
      if (!selectedShareDestination) {
        alert("Pick a place first by clicking A–E.");
        return;
      }

      const sessionId = Math.random().toString(36).substring(2, 8);

      db.ref("sessions/" + sessionId).set({
        destination: selectedShareDestination,
        name: selectedShareName,
        address1: document.getElementById("address1").value.trim(),
        address2: document.getElementById("address2").value.trim(),
        created: Date.now()
      })
      .then(() => {
        const link =
          "https://mondellowilliam-eng.github.io/midpoint-app/?session=" + sessionId;

        if (navigator.share) {
          navigator.share({
            title: "Midpoint Session",
            text: "Join my Midpoint session",
            url: link
          }).catch(() => {
            prompt("Copy and send this session link:", link);
          });
        } else {
          prompt("Copy and send this session link:", link);
        }
      })
      .catch((error) => {
        alert("Firebase error: " + error.message);
      });
    }
function checkTrackingHealth() {
  const now = Date.now();

  if (latestUser1Pos && latestUser1Pos.updated) {
    if (now - latestUser1Pos.updated > 15000) {
      document.getElementById("liveInfo").innerHTML =
        '<span class="status-warn">User 1 tracking paused</span>';
    }
  }

  if (latestUser2Pos && latestUser2Pos.updated) {
    if (now - latestUser2Pos.updated > 15000) {
      document.getElementById("liveInfo").innerHTML =
        '<span class="status-warn">User 2 tracking paused</span>';
    }
  }
}
    function chooseRole(role) {
  selectedRole = role;

  document.getElementById("liveInfo").innerHTML =
    'Selected <span class="status-ok">' +
    (role === "user1" ? "Person 1 (Blue)" : "Person 2 (Orange)") +
    '</span>. Now tap Start Live Sharing.';
}

    function startLiveSharing() {
  if (!currentSessionId) {
    document.getElementById("liveInfo").innerHTML =
      '<span class="status-error">No shared session loaded.</span>';
    return;
  }

  if (!selectedRole) {
    document.getElementById("liveInfo").innerHTML =
      '<span class="status-warn">Choose Person 1 or Person 2 first.</span>';
    return;
  }

  if (!navigator.geolocation) {
    document.getElementById("liveInfo").innerHTML =
      '<span class="status-error">Geolocation not supported.</span>';
    return;
  }

  document.getElementById("liveInfo").innerHTML =
    'Getting location...';

  // 🔥 STEP 1: get location immediately
  navigator.geolocation.getCurrentPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      db.ref("sessions/" + currentSessionId + "/live/" + selectedRole).set({
        lat: lat,
        lng: lng,
        updated: Date.now()
      });

     document.getElementById("liveInfo").innerHTML =
  'Live sharing active as <span class="status-ok">' +
  (selectedRole === "user1" ? "Person 1 (Blue)" : "Person 2 (Orange)") +
  '</span>';
    },
    function(error) {
      document.getElementById("liveInfo").innerHTML =
        '<span class="status-error">Location error: ' + error.message + '</span>';
    },
    {
      enableHighAccuracy: true,
      timeout: 10000
    }
  );

  // 🔥 STEP 2: continuous tracking
  if (liveWatchId !== null) {
    navigator.geolocation.clearWatch(liveWatchId);
  }

  liveWatchId = navigator.geolocation.watchPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      db.ref("sessions/" + currentSessionId + "/live/" + selectedRole).set({
        lat: lat,
        lng: lng,
        updated: Date.now()
      });
    },
    function(error) {
      document.getElementById("liveInfo").innerHTML =
        '<span class="status-error">Tracking stopped: ' + error.message + '</span>';
    },
    {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 15000
    }
  );
}

    function updateRouteForUser(userNumber, originPos) {
      if (!selectedDestinationLatLng || !originPos) return;

      directionsService.route(
        {
          origin: originPos,
          destination: selectedDestinationLatLng,
          travelMode: google.maps.TravelMode.DRIVING
        },
        function(result, status) {
          if (status !== "OK") return;

          if (userNumber === 1) {
            directionsRenderer1.setDirections(result);
          } else {
            directionsRenderer2.setDirections(result);
          }
        }
      );
    }

    function refreshBothRoutes() {
      if (latestUser1Pos) updateRouteForUser(1, latestUser1Pos);
      if (latestUser2Pos) updateRouteForUser(2, latestUser2Pos);
    }

    function listenToLiveUsers(sessionId) {
      db.ref("sessions/" + sessionId + "/live/user1").on("value", snapshot => {
        const data = snapshot.val();
        if (!data) return;

        const pos = { lat: data.lat, lng: data.lng, updated: data.updated };

        if (!liveUser1Marker) {
          liveUser1Marker = new google.maps.Marker({
            position: pos,
            map: map,
            label: "1",
            title: "User 1 Live"
          });
        } else {
          liveUser1Marker.setPosition(pos);
        }

        refreshBothRoutes();
      });

      db.ref("sessions/" + sessionId + "/live/user2").on("value", snapshot => {
        const data = snapshot.val();
        if (!data) return;

        const pos = { lat: data.lat, lng: data.lng };
        latestUser2Pos = pos;

        if (!liveUser2Marker) {
          liveUser2Marker = new google.maps.Marker({
            position: pos,
            map: map,
            label: "2",
            title: "User 2 Live"
          });
        } else {
          liveUser2Marker.setPosition(pos);
        }

        refreshBothRoutes();
      });
    }

  function openNavigation(origin, destination) {
  const link =
    "google.navigation:q=" + encodeURIComponent(destination) + "&mode=d";

  window.location.href = link;
}
function openMyRoute() {
  if (!selectedShareDestination) {
    alert("Missing destination.");
    return;
  }

  if (!navigator.geolocation) {
    alert("Geolocation is not supported on this device.");
    return;
  }

  const statusLabel = selectedRole === "user1" ? "Person 1" : selectedRole === "user2" ? "Person 2" : "this user";

  document.getElementById("liveInfo").innerHTML =
    'Getting current location for <span class="status-ok">' + statusLabel + '</span>...';

  navigator.geolocation.getCurrentPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      const link =
        "https://www.google.com/maps/dir/?api=1" +
        "&origin=" + encodeURIComponent(lat + "," + lng) +
        "&destination=" + encodeURIComponent(selectedShareDestination) +
        "&travelmode=driving" +
        "&dir_action=navigate";

      window.location.href = link;
    },
    function(error) {
      document.getElementById("liveInfo").innerHTML =
        '<span class="status-error">Could not get current location: ' + error.message + '</span>';
      alert("Could not get current location. Please allow location access.");
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 10000
    }
  );
}
    function showSelectedPlace(place) {
  const destination = place.vicinity || place.name;

  selectedShareName = place.name;
  selectedShareDestination = destination;
  selectedDestinationLatLng = {
    lat: place.geometry.location.lat(),
    lng: place.geometry.location.lng()
  };

  if (destinationMarker) destinationMarker.setMap(null);
  destinationMarker = new google.maps.Marker({
    position: place.geometry.location,
    map: map,
    title: place.name,
    icon: "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
  });

  document.getElementById("selectedPlace").innerHTML =
    "<strong>✅ " + place.name + "</strong><br>" +
    destination +
    '<div class="action-row">' +
      '<button class="session-btn" type="button" onclick="createSession()">Share Session</button>' +
    '</div>';

  refreshBothRoutes();

  document.getElementById("selectedPlace").scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

    function selectPlaceByIndex(index) {
      if (!currentPlaces[index]) return;
      showSelectedPlace(currentPlaces[index]);
    }

    function searchNearby(mid, keyword) {
      placesService.nearbySearch({
        location: mid,
        radius: 1000,
        keyword: keyword || undefined
      }, function(results, status) {
        if (status !== "OK" || !results || !results.length) {
          document.getElementById("selectedPlace").innerHTML = "No places found nearby.";
          return;
        }

        currentPlaces = results.slice(0, 5);
        const topPlace = currentPlaces[0];

        let html =
          '<div class="top-pick">' +
          '⭐ <strong>Top Pick: ' + topPlace.name + '</strong><br>' +
          (topPlace.vicinity || topPlace.name) + '<br>' +
          '<em>Tap a result below or click a letter on the map.</em>' +
          '</div>';

        html += '<div style="margin-top:10px;">';

        currentPlaces.forEach((place, index) => {
          const label = String.fromCharCode(65 + index);
          html +=
            '<button class="place-list-btn" type="button" onclick="selectPlaceByIndex(' + index + ')">' +
            label + '. ' + place.name +
            (place.vicinity ? ' — ' + place.vicinity : '') +
            '</button>';
        });

        html += '</div>';

        document.getElementById("selectedPlace").innerHTML = html;

        currentPlaces.forEach((place, index) => {
          const marker = new google.maps.Marker({
            map: map,
            position: place.geometry.location,
            title: place.name,
            label: String.fromCharCode(65 + index)
          });

          markers.push(marker);

          marker.addListener("click", function() {
            showSelectedPlace(place);
          });
        });
      });
    }

    function showDestinationFromSession(destinationText) {
      geocoder.geocode({ address: destinationText }, function(results, status) {
        if (status !== "OK" || !results.length) return;

        const location = results[0].geometry.location;
        selectedDestinationLatLng = {
          lat: location.lat(),
          lng: location.lng()
        };

        if (destinationMarker) destinationMarker.setMap(null);

        destinationMarker = new google.maps.Marker({
          position: location,
          map: map,
          title: destinationText,
          icon: "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
        });

        map.setCenter(location);
        map.setZoom(13);

        refreshBothRoutes();
      });
    }

    function loadSession() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session");

      if (!sessionId) return;

      currentSessionId = sessionId;

      db.ref("sessions/" + sessionId).once("value", snapshot => {
        const data = snapshot.val();
        if (!data) return;

        selectedShareDestination = data.destination || "";
        selectedShareName = data.name || "";

        document.getElementById("sharedSessionInfo").innerHTML =
          '<div class="shared-box">' +
          '🔗 <strong>Shared Session Loaded</strong><br>' +
          (data.name || "") + '<br>' +
          (data.destination || "") +
         '<div class="action-row">' +
  '<button class="session-btn" type="button" onclick="chooseRole(\'user1\')">Start as Person 1</button>' +
  '<button class="session-btn" type="button" onclick="chooseRole(\'user2\')">Start as Person 2</button>' +
  '<button class="live-btn" type="button" onclick="startLiveSharing()">Start Live Sharing</button>' +
'</div>'

        if (data.address1) document.getElementById("address1").value = data.address1;
        if (data.address2) document.getElementById("address2").value = data.address2;

        if (data.destination) {
          showDestinationFromSession(data.destination);
        }

       if (data.name && data.destination) {
  document.getElementById("selectedPlace").innerHTML =
    "<strong>✅ Shared Meetup: " + data.name + "</strong><br>" +
    data.destination +
    '<div class="action-row">' +
      '<button class="action-link" type="button" onclick="openMyRoute()">Open My Route in Google Maps</button>' +
    '</div>';
}

        listenToLiveUsers(sessionId);
      });
    }

    function findMidpoint() {
      const a1 = document.getElementById("address1").value.trim();
      const a2 = document.getElementById("address2").value.trim();
      const keyword = document.getElementById("placeKeyword").value.trim();
      const slider = document.getElementById("weightSlider").value / 100;

      if (!a1 || !a2) {
        alert("Enter both addresses");
        return;
      }

      clearMarkers();

      geocoder.geocode({ address: a1 }, function(r1, s1) {
        if (s1 !== "OK" || !r1.length) {
          alert("Could not find first address.");
          return;
        }

        geocoder.geocode({ address: a2 }, function(r2, s2) {
          if (s2 !== "OK" || !r2.length) {
            alert("Could not find second address.");
            return;
          }

          const c1 = r1[0].geometry.location;
          const c2 = r2[0].geometry.location;

          m1 = new google.maps.Marker({
            position: c1,
            map: map,
            label: "1"
          });

          m2 = new google.maps.Marker({
            position: c2,
            map: map,
            label: "2"
          });

          const midLat0 = (c1.lat() + c2.lat()) / 2;
          const midLng0 = (c1.lng() + c2.lng()) / 2;

          const shift = (slider - 0.5) * 0.6;

          const mid = {
            lat: midLat0 + (c1.lat() - midLat0) * shift,
            lng: midLng0 + (c1.lng() - midLng0) * shift
          };

          midpointMarker = new google.maps.Marker({
            position: mid,
            map: map,
            icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
          });

          const d1 = getDistanceKm(c1.lat(), c1.lng(), mid.lat, mid.lng).toFixed(1);
          const d2 = getDistanceKm(c2.lat(), c2.lng(), mid.lat, mid.lng).toFixed(1);

          document.getElementById("distanceInfo").innerHTML =
            "User 1 to midpoint: " + d1 + " km<br>" +
            "User 2 to midpoint: " + d2 + " km";

          const bounds = new google.maps.LatLngBounds();
          bounds.extend(c1);
          bounds.extend(c2);
          bounds.extend(mid);
          map.fitBounds(bounds);

          searchNearby(mid, keyword);
        });
      });
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAs8oXRXd_vPW8Ww5cCBS-aDaic8YgB9F4&loading=async&libraries=places&callback=initMap">
  </script>

</body>
</html>
